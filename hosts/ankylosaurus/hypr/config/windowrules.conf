##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$
windowrule = workspace 3 silent, class:steam
windowrule = workspace 4 silent, class:discord-ptb

windowrule = opacity 0.9 0.8, class:^(kitty)$
windowrule = opacity 0.9 0.8, class:org.kde.konsole
windowrule = opacity 0.9 0.8, class:org.kde.dolphin
windowrule = opacity 0.9 0.8, class:org.kde.kate

windowrule = float, class:org.pulseaudio.pavucontrol

# Hyprpolkitagent
windowrule = float, title:^(Hyprland Polkit Agent)$
windowrule = move 5 5, title:^(Hyprland Polkit Agent)$

# Notifs
windowrule = float, class:^()$, title:^()$
windowrule = monitor DP-2, class:^()$, title:^()$
windowrule = move 5 5, class:^()$, title:^()$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
