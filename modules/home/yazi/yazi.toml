[mgr]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_symlink = true
scrolloff = 5
linemode = "none"

[preview]
wrap = "yes"
tab_size = 2
image_delay = 30
max_width = 1800
max_height = 1200

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim", for = "linux" }
]

open = [
  { run = 'xdg-open "$1"', orphan = true, desc = "Open", for = "linux" }
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"', orphan = true, desc = "Reveal", for = "linux" }
]

okular = [
  { run = 'okular "$@"', orphan = true, desc = "Okular", for = "linux" }
]

play = [
  { run = 'mpv "$@"', orphan = true, desc = "mpv", for = "linux" }
]

image = [
  { run = 'imv "$@"', orphan = true, desc = "imv", for = "linux" },
  { run = 'xdg-open "$1"', orphan = true, desc = "Open", for = "linux" }
]

browser = [
  { run = 'firefox "$1"', orphan = true, desc = "Firefox", for = "linux" }
]

archive = [
  { run = 'xdg-open "$1"', orphan = true, desc = "Archive Manager", for = "linux" }
]

[open]
prepend_rules = [
  { mime = "text/*", use = [ "edit", "open", "reveal" ] },
  { mime = "application/json", use = [ "edit", "open", "reveal" ] },

  { mime = "application/pdf", use = [ "okular", "open", "reveal" ] },

  { mime = "image/*", use = [ "image", "open", "reveal" ] },
  { mime = "video/*", use = [ "play", "open", "reveal" ] },
  { mime = "audio/*", use = [ "play", "open", "reveal" ] },

  { url = "*.nix", use = [ "edit", "open", "reveal" ] },
  { url = "*.md", use = [ "edit", "open", "reveal" ] },
  { url = "*.html", use = [ "browser", "edit", "open" ] },

  { mime = "application/zip", use = [ "archive", "reveal" ] },
  { mime = "application/x-tar", use = [ "archive", "reveal" ] },
  { mime = "application/gzip", use = [ "archive", "reveal" ] }
]
